<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Black Steel | Admin Queue</title>

<style>
body {
    margin:0;
    background:#0b0f14;
    color:#e6e6e6;
    font-family:Arial, sans-serif;
}

.container {
    padding:40px;
    max-width:1000px;
    margin:auto;
}

h1 {
    font-size:18px;
    letter-spacing:2px;
}

.card {
    background:#0f151c;
    border:1px solid #1f2a35;
    padding:15px;
    margin-top:10px;
}

.small {
    font-size:12px;
    opacity:0.7;
}

button {
    margin-top:8px;
    margin-right:6px;
    padding:8px;
    background:#0b0f14;
    border:1px solid #1f2a35;
    color:#fff;
    cursor:pointer;
}

button:hover {
    border-color:#4fd1ff;
}
</style>
</head>

<body>

<div class="container">
    <h1>ADMIN REQUEST QUEUE</h1>
    <div id="list">Loading...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
    getFirestore,
    collection,
    query,
    orderBy,
    onSnapshot,
    doc,
    updateDoc,
    getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbaJCjjzU9DdJFY28MXW3LYesDdYfzyqg",
  authDomain: "black-steel-6a724.firebaseapp.com",
  projectId: "black-steel-6a724",
  storageBucket: "black-steel-6a724.firebasestorage.app",
  messagingSenderId: "575442597157",
  appId: "1:575442597157:web:432c1d0fd45f5634ff16cc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const list = document.getElementById("list");

onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "portal.html";
        return;
    }

    // 🔐 ROLE CHECK
    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);

    if (!snap.exists() || snap.data().role !== "admin") {
        window.location.href = "dashboard.html";
        return;
    }

    loadQueue();
});

function loadQueue() {
    const q = query(collection(db, "requests"), orderBy("createdAt", "desc"));

    onSnapshot(q, (snapshot) => {

        list.innerHTML = "";

        if (snapshot.empty) {
            list.innerHTML = "<p>No requests found</p>";
            return;
        }

        snapshot.forEach((docSnap) => {
            const d = docSnap.data();

            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <div class="small">${d.email}</div>
                <div><strong>${d.title}</strong></div>
                <div class="small">${d.details}</div>
                <div><strong>Status:</strong> ${d.status}</div>

                <button onclick="updateStatus('${docSnap.id}', 'pending')">Pending</button>
                <button onclick="updateStatus('${docSnap.id}', 'in-progress')">In Progress</button>
                <button onclick="updateStatus('${docSnap.id}', 'complete')">Complete</button>
            `;

            list.appendChild(div);
        });
    });
}

window.updateStatus = async function(id, status) {
    const ref = doc(db, "requests", id);
    await updateDoc(ref, { status });
};
</script>

</body>
</html>
