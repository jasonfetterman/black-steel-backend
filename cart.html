<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Cart | Black Steel Innovations</title>

<style>
body{
    margin:0;
    background:#0b0f14;
    color:#e6e6e6;
    font-family:Arial, sans-serif;
    padding:40px;
}

h1{ margin-bottom:20px; }

.cart-item{
    background:#0f151c;
    border:1px solid #2b3138;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button{
    background:#ff4d4d;
    border:none;
    padding:6px 10px;
    color:white;
    cursor:pointer;
    border-radius:6px;
}

.summary{
    margin-top:20px;
    padding:15px;
    border-top:1px solid #2b3138;
}
</style>
</head>

<body>

<h1>Your Cart</h1>

<div id="cart"></div>
<div class="summary" id="summary"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbaJCjjzU9DdJFY28MXW3LYesDdYfzyqg",
  authDomain: "black-steel-6a724.firebaseapp.com",
  projectId: "black-steel-6a724"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadCart(){
    let cart = JSON.parse(localStorage.getItem("cart") || "[]");

    const container = document.getElementById("cart");
    container.innerHTML = "";

    if(cart.length === 0){
        container.innerHTML = "<p>Your cart is empty.</p>";
        return;
    }

    for(let i=0;i<cart.length;i++){
        const item = cart[i];

        const snap = await getDoc(doc(db,"products",item.id));

        if(!snap.exists()) continue;

        const data = snap.data();

        const div = document.createElement("div");
        div.className = "cart-item";

        div.innerHTML = `
            <div>
                <strong>${data.name}</strong><br>
                <small>Size: ${item.size}</small><br>
                <small>$${data.price}</small>
            </div>
            <button onclick="removeItem(${i})">Remove</button>
        `;

        container.appendChild(div);
    }

    document.getElementById("summary").innerHTML =
        `<h3>Total Items: ${cart.length}</h3>`;
}

window.removeItem = function(index){
    let cart = JSON.parse(localStorage.getItem("cart") || "[]");
    cart.splice(index,1);
    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

loadCart();
</script>

</body>
</html>
