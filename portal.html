<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Portal | Black Steel Innovations</title>

<style>
body {
    margin:0;
    background:#0b0f14;
    color:#e6e6e6;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box {
    width:360px;
    background:#0f151c;
    border:1px solid #1f2a35;
    padding:24px;
}
h1 { font-size:18px; margin:0; }
input, button {
    width:100%;
    margin-top:12px;
    padding:10px;
    background:#0b0f14;
    border:1px solid #1f2a35;
    color:#e6e6e6;
}
button { border-color:#4fd1ff; color:#4fd1ff; cursor:pointer; }
button:hover { background:#4fd1ff; color:#0b0f14; }
.status { margin-top:10px; font-size:11px; opacity:0.8; }
</style>
</head>

<body>

<div class="box">
<h1>PORTAL LOGIN</h1>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">LOGIN</button>
<div class="status" id="status">ready</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCbaJCjjzU9DdJFY28MXW3LYesDdYfzyqg",
  authDomain:"black-steel-6a724.firebaseapp.com",
  projectId:"black-steel-6a724",
  storageBucket:"black-steel-6a724.firebasestorage.app",
  messagingSenderId:"575442597157",
  appId:"1:575442597157:web:432c1d0fd45f5634ff16cc"
});

const auth = getAuth(app);
const db = getFirestore(app);

window.login = async () => {
  const email = email.value;
  const password = password.value;

  status.innerText = "authenticating...";

  try {
    const cred = await signInWithEmailAndPassword(auth, email, password);
    const user = cred.user;

    const ref = doc(db,"users",user.uid);
    const snap = await getDoc(ref);

    if(!snap.exists()){
      await setDoc(ref,{
        email:user.email,
        role:"client",
        status:"active",
        createdAt:serverTimestamp()
      });
    }

    status.innerText="success";
    setTimeout(()=>location.href="dashboard.html",500);

  } catch(e){
    status.innerText="failed";
  }
};

onAuthStateChanged(auth,(u)=>{
  if(u) location.href="dashboard.html";
});
</script>

</body>
</html>
