<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Black Steel | Request Detail</title>

<style>
body {
    margin:0;
    background:#0b0f14;
    color:#e6e6e6;
    font-family:Arial, sans-serif;
}

.container {
    padding:40px;
    max-width:800px;
    margin:auto;
}

.card {
    background:#0f151c;
    border:1px solid #1f2a35;
    padding:15px;
    margin-top:15px;
}

.small {
    font-size:12px;
    opacity:0.7;
}

button {
    margin-top:10px;
    margin-right:8px;
    padding:10px;
    background:#0b0f14;
    border:1px solid #1f2a35;
    color:#fff;
    cursor:pointer;
}

button:hover {
    border-color:#4fd1ff;
}
</style>
</head>

<body>

<div class="container">

    <h1>REQUEST DETAIL</h1>

    <div id="main">Loading...</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
    getFirestore,
    doc,
    getDoc,
    updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbaJCjjzU9DdJFY28MXW3LYesDdYfzyqg",
  authDomain: "black-steel-6a724.firebaseapp.com",
  projectId: "black-steel-6a724",
  storageBucket: "black-steel-6a724.firebasestorage.app",
  messagingSenderId: "575442597157",
  appId: "1:575442597157:web:432c1d0fd45f5634ff16cc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let currentUser = null;
let requestData = null;

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "portal.html";
        return;
    }

    currentUser = user;
    loadRequest();
});

async function loadRequest() {
    const ref = doc(db, "requests", id);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
        document.getElementById("main").innerText = "Request not found";
        return;
    }

    requestData = snap.data();

    document.getElementById("main").innerHTML = `
        <div class="card">
            <div class="small">${requestData.email}</div>
            <h3>${requestData.title}</h3>
            <p>${requestData.details}</p>
            <p><strong>Status:</strong> ${requestData.status}</p>

            <button onclick="setStatus('pending')">Pending</button>
            <button onclick="setStatus('in-progress')">In Progress</button>
            <button onclick="setStatus('complete')">Complete</button>
        </div>
    `;
}

window.setStatus = async function(status) {
    const ref = doc(db, "requests", id);
    await updateDoc(ref, { status });
    loadRequest();
};
</script>

</body>
</html>
