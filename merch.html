<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Merch | Black Steel Innovations</title>

<style>
:root{
    --black:#0b0f14;
    --panel:#0f151c;
    --mech:#2b3138;
    --mech2:#3a424c;
    --mil:#2f3b2f;
    --cyan:#4fd1ff;
}

body {
    margin:0;
    background:var(--black);
    color:#e6e6e6;
    font-family:Arial, sans-serif;
}

/* HEADER */
.header {
    padding:18px 40px;
    background:#070b10;
    border-bottom:1px solid var(--mech);
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:10;
}

.nav {
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

.nav a {
    color:#e6e6e6;
    text-decoration:none;
    font-size:11px;
    opacity:0.75;
}

.nav a:hover {
    color:var(--cyan);
    opacity:1;
}

/* HERO */
.hero {
    padding:40px 40px 10px 40px;
}

.hero h2 {
    margin:0;
    font-size:22px;
    letter-spacing:2px;
}

/* FILTER BAR */
.filters {
    padding:0 40px 10px 40px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.filters button {
    background:#0f151c;
    border:1px solid #2b3138;
    color:#e6e6e6;
    padding:6px 10px;
    cursor:pointer;
    font-size:11px;
    border-radius:6px;
}

.filters button:hover {
    border-color:#4fd1ff;
    color:#4fd1ff;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(240px,1fr));
    gap:18px;
    padding:20px 40px 60px 40px;
}

/* CARD */
.card {
    background:var(--panel);
    border:1px solid var(--mech);
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:0.2s ease;
    display:flex;
    flex-direction:column;
    text-decoration:none;
    color:inherit;
    box-shadow:0 0 6px rgba(79,209,255,0.12);
}

.card:hover {
    border-color:var(--cyan);
    transform:translateY(-3px);
    box-shadow:
        0 0 14px rgba(79,209,255,0.30),
        0 0 30px rgba(79,209,255,0.15);
}

/* IMAGE */
.card img {
    width:100%;
    height:170px;
    object-fit:cover;
    display:block;
}

/* CONTENT */
.card-content {
    padding:12px;
    display:flex;
    flex-direction:column;
    gap:6px;
    text-align:center;
}

.name {
    font-size:13px;
    font-weight:bold;
    letter-spacing:1px;
}

.price {
    font-size:12px;
    color:var(--cyan);
}

.tag {
    font-size:10px;
    opacity:0.7;
}

/* SIZE OPTIONS */
.sizes {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:6px;
    margin-top:6px;
}

.size {
    font-size:10px;
    padding:3px 6px;
    border:1px solid var(--mech2);
    border-radius:6px;
    opacity:0.85;
    background:rgba(0,0,0,0.15);
}

.size:hover {
    border-color:var(--cyan);
    color:var(--cyan);
    opacity:1;
}

/* NOTE */
.note {
    padding:0 40px 40px 40px;
    font-size:11px;
    opacity:0.6;
    max-width:900px;
}
</style>
</head>

<body>

<div class="header">
    <div class="title">BLACK STEEL INNOVATIONS</div>

    <div class="nav">
        <a href="index.html">HOME</a>
        <a href="fleet.html">FLEET</a>
        <a href="services.html">SERVICES</a>
        <a href="technology.html">TECH</a>
        <a href="dashboard.html">DASHBOARD</a>
        <a href="contracts.html">CONTRACTS</a>
        <a href="compliance.html">COMPLIANCE</a>
        <a href="about.html">ABOUT</a>
        <a href="contact.html">CONTACT</a>
        <a href="portal.html">PORTAL</a>
    </div>
</div>

<div class="hero">
    <h2>Apparel & Gear</h2>
</div>

<div class="filters">
    <button onclick="setFilter('all')">ALL</button>
    <button onclick="setFilter('tshirt')">T-SHIRTS</button>
    <button onclick="setFilter('hoodie')">HOODIES</button>
    <button onclick="setFilter('hat')">HATS</button>
    <button onclick="setFilter('sticker')">STICKERS</button>
</div>

<div class="grid"></div>

<div class="note">
Fan-branded merchandise only. No operational equipment included or implied.
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbaJCjjzU9DdJFY28MXW3LYesDdYfzyqg",
  authDomain: "black-steel-6a724.firebaseapp.com",
  projectId: "black-steel-6a724"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const grid = document.querySelector(".grid");

let allProducts = [];
let currentFilter = "all";

function makeCard(data, id){
    const card = document.createElement("a");
    card.className = "card";
    card.href = `item.html?id=${id}`;

    const sizes = (data.sizes || []).map(s => `<div class="size">${s}</div>`).join("");

    card.innerHTML = `
        <img src="${data.image}">
        <div class="card-content">
            <div class="name">${data.name || ""}</div>
            <div class="price">$${data.price || 0}</div>
            <div class="tag">${(data.category || "").toUpperCase()}</div>
            <div class="sizes">${sizes}</div>
        </div>
    `;

    return card;
}

function render(){
    grid.innerHTML = "";

    let filtered = allProducts;

    if(currentFilter !== "all"){
        filtered = allProducts.filter(p => p.data.category === currentFilter);
    }

    filtered.forEach(p => {
        grid.appendChild(makeCard(p.data, p.id));
    });
}

window.setFilter = function(filter){
    currentFilter = filter;
    render();
}

async function load(){
    const snap = await getDocs(collection(db,"products"));

    allProducts = [];

    snap.forEach(doc => {
        allProducts.push({
            id: doc.id,
            data: doc.data()
        });
    });

    render();
}

load();
</script>

</body>
</html>
